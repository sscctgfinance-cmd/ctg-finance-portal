<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CTG 财务门户 · Finance Portal</title>
<style>
:root{color-scheme:light}*{box-sizing:border-box}
body{margin:0;background:#f4f6fa;color:#15181f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px}
.wrap{max-width:1080px;margin:0 auto;padding:18px 20px 60px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
h1{font-size:19px;margin:0}.sub{color:#6b7280;font-size:12.5px}
.who{font-size:12.5px;color:#374151}.who b{color:#111}
.btn{padding:7px 13px;border:1px solid #d6dae1;background:#fff;border-radius:9px;font-size:12.5px;cursor:pointer;color:#374151}
.btn.p{background:#2563eb;color:#fff;border-color:#2563eb}.btn.d{color:#c0392b;border-color:#f0c4c0}
.btn:disabled{opacity:.5;cursor:default}
.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0}
select,input{padding:8px 10px;border:1px solid #d6dae1;border-radius:9px;font-size:13px;background:#fff}
.tabs{display:flex;gap:4px;margin:10px 0 18px;border-bottom:1px solid #e6e8ee;flex-wrap:wrap}
.tab{padding:9px 14px;cursor:pointer;font-size:13.5px;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}.tab.hide{display:none}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.card{background:#fff;border:1px solid #e6e8ee;border-radius:12px;padding:14px 16px}
.card .n{font-size:20px;font-weight:650}.card .l{font-size:11.5px;color:#6b7280;margin-top:4px}
.card.green .n{color:#0a8a4a}.card.red .n{color:#c0392b}.card.blue .n{color:#2563eb}.card.amber .n{color:#b7791f}
.bigtable{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e6e8ee;border-radius:12px;overflow:hidden}
.bigtable th,.bigtable td{padding:10px 12px;border-bottom:1px solid #f0f1f4;font-size:12.8px;text-align:left}
.bigtable th{color:#9aa3b2;font-size:10.5px;text-transform:uppercase;font-weight:700}
td.amt{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.panel{background:#fff;border:1px solid #e6e8ee;border-radius:12px;padding:16px;margin-bottom:16px}
.panel h3{font-size:14px;margin:0 0 12px}.muted{color:#9aa3b2}.empty{text-align:center;color:#6b7280;padding:28px}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:#eef2ff;color:#2563eb}
.row-act{display:flex;gap:6px}
.load{text-align:center;color:#6b7280;padding:34px}.spin{display:inline-block;width:15px;height:15px;border:2px solid #d6dae1;border-top-color:#2563eb;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:7px}@keyframes sp{to{transform:rotate(360deg)}}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lbox{background:#fff;border:1px solid #e6e8ee;border-radius:16px;padding:30px 28px;width:340px;box-shadow:0 8px 30px rgba(0,0,0,.06)}
.lbox h1{font-size:18px;margin:0 0 4px}.lbox .sub{margin-bottom:16px}
.lbox input{width:100%;margin-bottom:11px}.lbox button{width:100%;padding:11px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:600;cursor:pointer}
.lerr{color:#c0392b;font-size:12.5px;margin-bottom:10px}
.hide{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#15181f;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.2s;z-index:50}
.toast.show{opacity:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
.fld{margin-bottom:12px}.fld label{display:block;font-size:12px;color:#6b7280;margin-bottom:4px}.fld select,.fld input,.fld textarea{width:100%}
textarea{padding:8px 10px;border:1px solid #d6dae1;border-radius:9px;font-size:13px;font-family:inherit;min-height:60px}
</style>
</head>
<body>

<div id="login">
  <form class="lbox" onsubmit="doLogin(event)">
    <h1>CTG 财务门户</h1>
    <div class="sub">Finance Portal · 请登录 · v4</div>
    <div class="lerr hide" id="lerr"></div>
    <input type="email" id="email" placeholder="邮箱" autocomplete="username" required/>
    <input type="password" id="pass" placeholder="密码" autocomplete="current-password" required/>
    <button type="submit" id="lbtn">登录</button>
  </form>
</div>

<div id="app" class="hide"><div class="wrap">
  <div class="top">
    <div><h1>CTG 财务门户</h1><div class="sub">实时来自 Xero · 按你的权限显示</div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="who" id="who"></span>
      <button class="btn" onclick="changePw()">改密码</button>
      <button class="btn d" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="bar">
    <span class="muted">公司:</span>
    <select id="company" onchange="onCompany()"></select>
    <button class="btn p" onclick="reloadActive()">刷新</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-t="overview" onclick="tab('overview')">财务总览</div>
    <div class="tab" data-t="approvals" onclick="tab('approvals')" id="tab-appr">待审批</div>
    <div class="tab" data-t="collections" onclick="tab('collections')" id="tab-coll">催收</div>
    <div class="tab" data-t="upload" onclick="tab('upload')">上传单据</div>
  </div>

  <div id="overview"></div>
  <div id="approvals" class="hide"></div>
  <div id="collections" class="hide"></div>
  <div id="upload" class="hide"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const API="https://cmostxcjtbuhbzfojuid.supabase.co/functions/v1/portal";
let TOKEN=localStorage.getItem("ctg_portal_token")||"";
let ME=null, COMPANIES=[];
const loaded={};
const esc=x=>(x==null?'':String(x)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const M=n=>'RM '+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
async function call(body){
  const ctrl=new AbortController();const tm=setTimeout(()=>ctrl.abort(),25000);
  try{
    const r=await fetch(API,{method:'POST',body:JSON.stringify(Object.assign({token:TOKEN},body)),signal:ctrl.signal});
    return await r.json();
  } finally { clearTimeout(tm); }
}
async function doLogin(e){
  e.preventDefault();
  const email=document.getElementById('email').value.trim(), pass=document.getElementById('pass').value;
  const b=document.getElementById('lbtn'),er=document.getElementById('lerr');
  er.classList.add('hide');b.disabled=true;b.textContent='登录中…';
  try{
    const r=await call({api:'login',email,pass,token:''});
    if(r&&r.ok){TOKEN=r.token;localStorage.setItem('ctg_portal_token',TOKEN);ME=r.user;COMPANIES=r.companies||[];showApp();return;}
    er.textContent='邮箱或密码不正确';er.classList.remove('hide');
  }catch(x){er.textContent='连接失败,请重试';er.classList.remove('hide');}
  b.disabled=false;b.textContent='登录';
}
function logout(){localStorage.removeItem('ctg_portal_token');location.reload();}
function roleZh(r){return r==='admin'?'管理员':r==='approver'?'审批人':'查看者';}
function showApp(){
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('who').innerHTML='<b>'+esc(ME.name||ME.email)+'</b> · '+roleZh(ME.role);
  const isApprover=(ME.role==='admin'||ME.role==='approver');
  document.getElementById('tab-appr').classList.toggle('hide',!isApprover);
  document.getElementById('tab-coll').classList.toggle('hide',!isApprover);
  const sel=document.getElementById('company');
  sel.innerHTML='<option value="">全部公司</option>'+COMPANIES.map(c=>'<option value="'+esc(c.tenant_id)+'">'+esc(c.tenant_name)+'</option>').join('');
  for(const k in loaded)delete loaded[k];
  tab('overview');
}
function tab(t){
  document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('active',e.dataset.t===t));
  ['overview','approvals','collections','upload'].forEach(id=>document.getElementById(id).classList.toggle('hide',id!==t));
  if(!loaded[t])render(t);
}
function reloadActive(){const a=document.querySelector('.tab.active');const t=a?a.dataset.t:'overview';loaded[t]=false;render(t);}
function onCompany(){loaded.overview=false;loaded.approvals=false;const a=document.querySelector('.tab.active');const t=a?a.dataset.t:'overview';if(t==='overview'||t==='approvals')render(t);}
function curCompany(){return document.getElementById('company').value;}
function spin(id){document.getElementById(id).innerHTML='<div class="load"><span class="spin"></span>载入中…</div>';}

async function render(t){
  loaded[t]=true;
  try{
    if(t==='overview')return await renderOverview();
    if(t==='approvals')return await renderApprovals();
    if(t==='collections')return renderCollections();
    if(t==='upload')return renderUpload();
  }catch(x){loaded[t]=false;document.getElementById(t).innerHTML='<div class="empty">载入失败:'+esc(x.message||x)+'<br><button class="btn" style="margin-top:10px" onclick="reloadActive()">重试</button></div>';}
}
function card(cls,n,l){return '<div class="card '+cls+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}

async function renderOverview(){
  spin('overview');
  const r=await call({api:'overview'});
  if(!r||!r.companies){document.getElementById('overview').innerHTML='<div class="empty">暂无数据</div>';return;}
  const filter=curCompany();
  let cs=r.companies.filter(c=>!filter||c.tenant_id===filter);
  const tot=cs.reduce((a,c)=>({inc:a.inc+ +c.income,exp:a.exp+ +c.expenses,np:a.np+ +c.net_profit,bank:a.bank+ +c.bank}),{inc:0,exp:0,np:0,bank:0});
  let h='<div class="cards">';
  h+=card('blue',M(tot.bank),'银行现金合计');
  h+=card(tot.np>=0?'green':'red',M(tot.np),'净利合计(本财年)');
  h+=card('green',M(tot.inc),'总收入');
  h+=card('amber',M(tot.exp),'总支出');
  h+='</div>';
  h+='<div class="panel"><h3>各公司财务(本财年至今)</h3><table class="bigtable"><thead><tr><th>公司</th><th class="amt">收入</th><th class="amt">支出</th><th class="amt">净利</th><th class="amt">银行现金</th></tr></thead><tbody>';
  cs.forEach(c=>{const col=(+c.net_profit>=0)?'#0a8a4a':'#c0392b';
    h+='<tr><td>'+esc(c.tenant_name)+'</td><td class="amt">'+M(c.income)+'</td><td class="amt" style="color:#c0392b">'+M(c.expenses)+'</td><td class="amt" style="color:'+col+'">'+M(c.net_profit)+'</td><td class="amt">'+M(c.bank)+'</td></tr>';});
  h+='</tbody></table></div>';
  if(r.as_of)h+='<div class="muted" style="font-size:11.5px;margin-top:8px">数据截至 '+new Date(r.as_of).toLocaleString()+' · 每小时自动刷新</div>';
  document.getElementById('overview').innerHTML=h;
}

async function renderApprovals(){
  spin('approvals');
  const r=await call({api:'pending'});
  if(!r||!r.bills){document.getElementById('approvals').innerHTML='<div class="empty">暂无数据</div>';return;}
  const filter=curCompany();
  let bills=r.bills.filter(b=>!filter||b.tenant_id===filter);
  let h='<div class="panel"><h3>待审批账单(Xero 草稿 / 待批)</h3>';
  if(!bills.length){h+='<div class="empty">✅ 没有待审批的账单。</div></div>';document.getElementById('approvals').innerHTML=h;return;}
  h+='<table class="bigtable"><thead><tr><th>公司</th><th>供应商</th><th>单号</th><th class="amt">金额</th><th>到期</th><th>状态</th><th></th></tr></thead><tbody>';
  bills.forEach((b,i)=>{
    h+='<tr id="bill'+i+'"><td style="font-size:11.5px">'+esc(b.tenant_name)+'</td><td>'+esc(b.contact||'—')+'</td><td>'+esc(b.number||'—')+'</td><td class="amt">'+M(b.total)+'</td><td class="muted">'+esc(b.due||'')+'</td><td><span class="pill">'+esc(b.status)+'</span></td>'+
    '<td class="row-act"><button class="btn p" onclick="approve(\''+esc(b.tenant_id)+'\',\''+esc(b.invoice_id)+'\',\'approve\','+i+')">通过</button>'+
    '<button class="btn d" onclick="approve(\''+esc(b.tenant_id)+'\',\''+esc(b.invoice_id)+'\',\'reject\','+i+')">拒绝</button></td></tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('approvals').innerHTML=h;
}
async function approve(tenant,invoice,action,i){
  if(action==='reject'&&!confirm('确定拒绝并作废这张账单?'))return;
  const row=document.getElementById('bill'+i);row.style.opacity=.5;
  const r=await call({api:'approve',tenant,invoice,action});
  if(r&&r.ok){toast(action==='approve'?'已通过(Xero 已生效)':'已拒绝');row.remove();}
  else{row.style.opacity=1;toast('失败:'+((r&&r.error)||'Xero 拒绝'));}
}

function renderCollections(){
  let h='<div class="panel"><h3>应收催收</h3><p class="muted">点击下方按钮,系统会立即生成「今天该催哪些客户」的预览清单,发到财务邮箱(ssc.ctgfinance)。预览模式不会直接发给客户。</p>';
  h+='<button class="btn p" onclick="trigColl(this)">立即生成催收预览</button><div id="collres" style="margin-top:14px"></div></div>';
  document.getElementById('collections').innerHTML=h;
}
async function trigColl(btn){
  btn.disabled=true;btn.textContent='生成中…';
  let r;try{r=await call({api:'collections'});}catch(x){r=null;}
  btn.disabled=false;btn.textContent='立即生成催收预览';
  const d=document.getElementById('collres');
  if(r&&r.ok){const x=r.result||{};d.innerHTML='<div class="card green" style="max-width:560px"><div class="n">'+(x.reachable_due_count||0)+' 张待催 · '+M(x.reachable_due_amount)+'</div><div class="l">已发预览到 '+esc(x.to||'财务邮箱')+';另有 '+(x.unreachable_count||0)+' 张因客户无邮箱无法自动催。</div></div>';}
  else d.innerHTML='<span style="color:#c0392b">失败:'+esc((r&&r.error)||'无权限或网络问题')+'</span>';
}

function renderUpload(){
  const opts=COMPANIES.map(c=>'<option value="'+esc(c.tenant_id)+'">'+esc(c.tenant_name)+'</option>').join('');
  let h='<div class="panel" style="max-width:560px"><h3>上传单据</h3><p class="muted">上传发票 / 收据 / 银行流水,进入财务处理流程。</p>'+
    '<div class="fld"><label>公司</label><select id="up_tenant">'+opts+'</select></div>'+
    '<div class="fld"><label>类型</label><select id="up_cat"><option>AP 供应商账单</option><option>Reimbursement 报销</option><option>Bank Statement 银行流水</option><option>Other 其他</option></select></div>'+
    '<div class="fld"><label>文件(PDF / 图片 / Excel)</label><input type="file" id="up_file" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.xls,.csv"/></div>'+
    '<div class="fld"><label>备注(可选)</label><textarea id="up_note" placeholder="例如:3月房租发票"></textarea></div>'+
    '<button class="btn p" onclick="doUpload(this)">上传</button><div id="upres" style="margin-top:12px"></div></div>';
  document.getElementById('upload').innerHTML=h;
}
async function doUpload(btn){
  const f=document.getElementById('up_file').files[0];
  const res=document.getElementById('upres');
  if(!f){res.innerHTML='<span style="color:#c0392b">请先选择文件</span>';return;}
  if(f.size>15*1024*1024){res.innerHTML='<span style="color:#c0392b">文件太大(上限 15MB)</span>';return;}
  btn.disabled=true;btn.textContent='上传中…';
  try{
    const b64=await new Promise((rs,rj)=>{const r=new FileReader();r.onload=()=>rs(r.result);r.onerror=rj;r.readAsDataURL(f);});
    const r=await call({api:'upload',tenant:document.getElementById('up_tenant').value,category:document.getElementById('up_cat').value,
      file_name:f.name,content_base64:b64,content_type:f.type,note:document.getElementById('up_note').value});
    if(r&&r.ok){res.innerHTML='<span style="color:#0a8a4a">✅ 已上传,财务会处理。</span>';document.getElementById('up_file').value='';document.getElementById('up_note').value='';}
    else res.innerHTML='<span style="color:#c0392b">失败:'+esc((r&&r.error)||'')+'</span>';
  }catch(x){res.innerHTML='<span style="color:#c0392b">上传失败:'+esc(x.message||x)+'</span>';}
  btn.disabled=false;btn.textContent='上传';
}

async function changePw(){
  const oldp=prompt('当前密码:');if(!oldp)return;
  const np=prompt('新密码(至少6位):');if(!np)return;
  let res;try{res=await call({api:'changepw',old:oldp,neu:np});}catch(x){res=null;}
  toast(res&&res.ok?'密码已更新':'失败:'+((res&&res.error)||'网络问题'));
}

if(TOKEN){ call({api:'me'}).then(r=>{ if(r&&r.ok){ME=r.user;COMPANIES=r.companies||[];showApp();} else {localStorage.removeItem('ctg_portal_token');TOKEN='';} }).catch(()=>{localStorage.removeItem('ctg_portal_token');TOKEN='';}); }
</script>
</body>
</html>
